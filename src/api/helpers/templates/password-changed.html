<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Password Changed</title>
  <style>
    body { margin: 0; padding: 0; background-color: #f5f6fa; font-family: 'Roboto', sans-serif; }
    .container { max-width: 620px; background: #ffffff; margin: auto; }
    .header { text-align: center; padding: 30px; font-size: 24px; font-weight: bold; color: #000; }
    .content { padding: 30px; color: #000; }
    .success-box { text-align: center; margin: 30px 0; padding: 20px; background-color: #f0fff4; border-radius: 6px; border: 1px solid #9ae6b4; }
    .footer { text-align: center; font-size: 12px; padding: 20px; color: #8094ae; }
  </style>
</head>
<body>
  <center>
    <table width="100%">
      <tr>
        <td>
          <table class="container">
            <tr><td class="header">Bank-Hub</td></tr>
            <tr>
              <td class="content">
                <p>Hello <strong>#NAME#</strong>,</p>
                <div class="success-box">
                  <p style="color: #276749; font-weight: bold; font-size: 16px;">
                    ✅ Your password has been changed successfully.
                  </p>
                </div>
                <p>If you did not make this change, please contact our support team immediately at <strong>#SUPPORT_MAIL#</strong>.</p>
                <p>— The Bank-Hub Team</p>
              </td>
            </tr>
          </table>
          <table class="container">
            <tr>
              <td class="footer">
                <p>If you did not request this change, contact support immediately.</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </center>
</body>
</html>
